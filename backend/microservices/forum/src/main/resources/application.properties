spring.application.name=forum
server.port=8096
# MySQL
spring.h2.console.enabled=false
spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua_forum?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#eureka registation
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/smartlingua
users.service.base-url=http://localhost:8087

