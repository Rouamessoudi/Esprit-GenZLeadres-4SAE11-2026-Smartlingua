spring.application.name=quiz
server.port=8088
#H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
#DataSource
spring.datasource.username=taher
spring.datasource.password=
#spring.datasource.url=jdbc:h2:file:./Database/Data/Candidat
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create
#eureka registation
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

# LanguageTool (API publique HTTPS, pas de clé requise pour usage basique)
languagetool.api.url=https://api.languagetool.org/v2/check
# Points retirés par erreur (score sur 100)
languagetool.score.penalty-per-error=5

# CORS pour appels futurs depuis le front (localhost)
cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:4202,http://localhost:54919,http://127.0.0.1:4200,http://127.0.0.1:4201,http://127.0.0.1:4202,http://127.0.0.1:54919
