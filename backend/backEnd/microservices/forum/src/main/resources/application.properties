spring.application.name=forum
server.port=8090

# MySQL - Créer la base "forumdb" avant de démarrer : CREATE DATABASE forumdb;
spring.datasource.url=jdbc:mysql://localhost:3306/forumdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#eureka registation
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

# CORS - Angular frontend
cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:4202,http://localhost:54919,http://127.0.0.1:4200,http://127.0.0.1:4201,http://127.0.0.1:4202,http://127.0.0.1:54919

# Module Notifications : appel HTTP vers users pour obtenir les ids (notifications "nouvelle annonce" pour tous).
users.service.url=http://localhost:8087/api/users
notifications.inactivity.enabled=true
notifications.inactivity-days=3
notifications.inactivity-cron=0 0 9 * * *
likes.trending-threshold=5
likes.rate-limit.max-actions=8
likes.rate-limit.window-seconds=30

# Actuator - pour debug des mappings (http://localhost:8090/actuator/mappings)
management.endpoints.web.exposure.include=health,info,mappings

