spring.application.name=users
server.port=8087

# DataSource - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/forumdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA - creates users table automatically if it does not exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS - Angular frontend (override in production)
cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:4202,http://localhost:54919,http://127.0.0.1:4200,http://127.0.0.1:4201,http://127.0.0.1:4202,http://127.0.0.1:54919

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
