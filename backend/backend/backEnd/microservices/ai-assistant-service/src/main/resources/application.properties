spring.application.name=ai-assistant-service
server.port=8095

spring.config.import=optional:classpath:application-secrets.properties,optional:file:./application-secrets.properties

spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua_messaging?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Paris

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
