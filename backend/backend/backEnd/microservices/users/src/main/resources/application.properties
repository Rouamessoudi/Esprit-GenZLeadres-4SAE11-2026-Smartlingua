spring.application.name=users
server.port=8087

# MySQL base commune (lancer MySQL avec : docker compose -f backend/docker-compose.yml up -d)
spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua
spring.datasource.username=smartlingua
spring.datasource.password=smartlingua
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# H2 console (désactivée si MySQL actif)
spring.h2.console.enabled=false
#eureka registation
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

# Issuer Keycloak : le microservice valide les JWT émis par ce realm (même URL que le front dans app.config.ts).
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/smartlingua
