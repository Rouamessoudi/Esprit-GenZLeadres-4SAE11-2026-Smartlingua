# MySQL uniquement (pas de H2). Par défaut pour les tests. Avec -DuseTestcontainers=true, MysqlTestContainerBase surcharge l'URL.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/smartlingua_messaging_test?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
