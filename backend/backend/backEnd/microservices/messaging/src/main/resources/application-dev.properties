# Profil "dev" : même config MySQL (pour run avec -Dspring.profiles.active=dev)
# Utilise la base MySQL smartlingua_messaging comme le profil par défaut.

spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua_messaging?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=10000&socketTimeout=10000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Paris

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
