# Microservice Messaging - Base MySQL uniquement (XAMPP / MySQL)
# ==============================================================
# AVANT DE LANCER :
# 1) Ouvre XAMPP Control Panel et démarre "MySQL" (bouton Start).
# 2) Si tu as défini un mot de passe pour l'utilisateur root, mets-le dans spring.datasource.password= ci-dessous.
# 3) La base smartlingua_messaging est créée automatiquement au premier démarrage.

spring.application.name=messaging
# 8094 car 8092 etait occupe. Frontend pointe vers 8094.
server.port=8094

# MySQL (localhost:3306 = XAMPP par défaut)
spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua_messaging?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=15000&socketTimeout=15000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP (pool de connexions)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.initialization-fail-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Paris

# Eureka désactivé (pas de registry)
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
