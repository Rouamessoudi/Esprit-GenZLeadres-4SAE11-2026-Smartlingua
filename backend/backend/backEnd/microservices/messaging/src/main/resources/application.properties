# Microservice Messaging — MySQL uniquement (XAMPP / port 3306). Utilisateurs : table app_user
spring.application.name=messaging
server.port=8094

spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua_messaging?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=15000&socketTimeout=15000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.initialization-fail-timeout=20000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Paris

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
