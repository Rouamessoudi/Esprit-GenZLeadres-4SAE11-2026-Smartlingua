<div class="forum-container">
  <div class="forum-header">
    <h1>Forum - Discussions</h1>
    <div class="header-actions">
      <input
        type="text"
        placeholder="Filtrer par catégorie..."
        [(ngModel)]="categoryFilter"
        (keyup.enter)="onCategoryChange()"
        class="filter-input"
      />
      <button (click)="onCategoryChange()" class="btn btn-secondary">Filtrer</button>
      <button (click)="newPost()" class="btn btn-primary">Nouveau post</button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Chargement...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && !error" class="posts-list">
    <div *ngFor="let post of posts" class="post-card" (click)="viewPost(post.id!)">
      <h3>{{ post.title }}</h3>
      <p class="post-meta">
        <span *ngIf="post.category" class="category">{{ post.category }}</span>
        <span class="date">{{ post.createdAt | date:'short' }}</span>
      </p>
      <p class="post-content">{{ post.content | slice:0:150 }}{{ post.content!.length > 150 ? '...' : '' }}</p>
    </div>
    <div *ngIf="posts.length === 0" class="empty">Aucun post pour le moment.</div>
  </div>
</div>
