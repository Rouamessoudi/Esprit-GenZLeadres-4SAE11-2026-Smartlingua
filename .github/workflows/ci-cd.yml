name: SmartLingua CI/CD Sprint 3

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    name: Backend CI - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/apiGateway
          - backend/config-server
          - backend/eureka
          - backend/microservices/users
          - backend/microservices/quiz
          - backend/microservices/privetcours
          - backend/microservices/messaging
          - backend/microservices/forum
          - backend/microservices/exams
          - backend/microservices/courses
          - backend/microservices/ai-assistant-service
          - backend/microservices/adaptive-learning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit tests
        run: mvn test
        working-directory: ${{ matrix.service }}

      - name: Build package
        run: mvn clean package
        working-directory: ${{ matrix.service }}

      - name: Generate JaCoCo report
        run: mvn jacoco:report
        working-directory: ${{ matrix.service }}

  frontend-ci:
    name: Frontend CI - Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Run frontend unit tests
        run: npm test --if-present

  sonar-backend:
    name: SonarQube - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/apiGateway
          - backend/config-server
          - backend/eureka
          - backend/microservices/users
          - backend/microservices/quiz
          - backend/microservices/privetcours
          - backend/microservices/messaging
          - backend/microservices/forum
          - backend/microservices/exams
          - backend/microservices/courses
          - backend/microservices/ai-assistant-service
          - backend/microservices/adaptive-learning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: SonarQube analysis with JaCoCo coverage
        run: >
          mvn clean verify sonar:sonar
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        working-directory: ${{ matrix.service }}

  cd-simulated:
    name: CD - Simulated deployment
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate backend deployment package
        run: |
          echo "CD simulation started for SmartLingua backend."
          echo "Artifacts would be built and pushed to registry in real deployment."
          echo "No production deployment is configured in this repository."

      - name: Simulate frontend deployment package
        run: |
          echo "Frontend deployment simulation completed."
          echo "Next step in production: push frontend image/static assets to hosting platform."
