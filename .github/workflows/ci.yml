name: SmartLingua CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/apiGateway
          - backend/config-server
          - backend/eureka
          - backend/microservices/users
          - backend/microservices/quiz
          - backend/microservices/privetcours
          - backend/microservices/messaging
          - backend/microservices/forum
          - backend/microservices/exams
          - backend/microservices/courses
          - backend/microservices/ai-assistant-service
          - backend/microservices/adaptive-learning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: mvn clean install
        working-directory: ${{ matrix.service }}

      - name: Run unit tests
        run: mvn test
        working-directory: ${{ matrix.service }}

  frontend:
    name: Frontend - Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm test --if-present
