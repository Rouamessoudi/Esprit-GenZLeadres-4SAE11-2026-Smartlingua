name: SmartLingua CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend - ${{ matrix.service }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: smartlingua
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/apiGateway
          - backend/config-server
          - backend/eureka
          - backend/microservices/users
          - backend/microservices/quiz
          - backend/microservices/privetcours
          - backend/microservices/messaging
          - backend/microservices/forum
          - backend/microservices/exams
          - backend/microservices/courses
          - backend/microservices/ai-assistant-service
          - backend/microservices/adaptive-learning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Initialize MySQL database
        run: |
          docker cp .github/sql/ci-init.sql "${{ job.services.mysql.id }}:/tmp/ci-init.sql"
          docker exec "${{ job.services.mysql.id }}" sh -c "mysql -uroot -proot < /tmp/ci-init.sql"

      # config-server / gateway / eureka: no DB — forcing spring.profiles.active=ci breaks config-server
      # (native profile lost → Cloud Config expects git.uri). DB microservices keep ci for MySQL.
      - name: Build with Maven
        working-directory: ${{ matrix.service }}
        run: |
          set -e
          case "${{ matrix.service }}" in
            backend/config-server|backend/apiGateway|backend/eureka) MAVEN_CI="" ;;
            *) MAVEN_CI="-Dspring.profiles.active=ci" ;;
          esac
          mvn clean install $MAVEN_CI

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: |
          set -e
          case "${{ matrix.service }}" in
            backend/config-server|backend/apiGateway|backend/eureka) MAVEN_CI="" ;;
            *) MAVEN_CI="-Dspring.profiles.active=ci" ;;
          esac
          mvn test $MAVEN_CI

      - name: Show Surefire reports on failure
        if: failure()
        run: |
          echo "===== Surefire reports ====="
          ls -la target/surefire-reports || true
          cat target/surefire-reports/*.txt || true
          cat target/surefire-reports/*.dumpstream || true
        working-directory: ${{ matrix.service }}

  frontend:
    name: Frontend - Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm test --if-present -- --watch=false --browsers=ChromeHeadless
